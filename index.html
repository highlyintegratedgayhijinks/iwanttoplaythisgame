<html lang="en">
<head>
	<title>I want to play this game</title>
	<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
	<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.13.1/underscore-min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/canvas2image@1.0.5/canvas2image.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
	<link rel="stylesheet" href="style.css?v=4">
	<link rel="stylesheet" href="color.css?v=5">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="icons.css">
<body>
	<div id="header">
		<div id="headerButtons"></div>
	</div>
	<div id="container">
		<div id="wrapper">
			<div id="log" class="box log main" style="display:none;">
				<div class="header"><strong>Facts</strong><div class="right"><div class="buttons"></div><div class="infoButton info"></div></div></div>				
				<div class="content"></div>
			</div> 
			<div id="ideas" class="box ideas main" style="display:none;">
				<div class="header"><strong>Ideas</strong><div class="right"><div class="buttons"></div><div class="infoButton info"></div></div></div>
				<div id="pure" class="content section"><div class="title">Pure ideas</div></div>
				<div id="impure" class="content section"><div class="title">Impure ideas</div></div>
			</div>
			<div id="things" class="box things main" style="display:none;">
				<div class="header"><strong>Things</strong><div class="right"><div class="buttons"></div><div class="infoButton info"></div></div></div>
				<div id="pure" class="content section"><div class="title">Pure things</div></div>
				<div id="artifact" class="content section"><div class="title"><strong>Artifacts</strong></div></div>
				<div id="liquids" class="content section"><div class="title"><strong>Liquids</strong></div></div>
				<div id="dusts" class="content section"><div class="title">Dusts</div></div>
				<div id="impure" class="content section"><div class="title">Impure things</div></div>
			</div>
		</div>
		<div id="finalMachines" style="display:none;">
			<canvas id="particleCanvas"></canvas>
			<div id="enminder" class="finalMachine box">
				<div class="header"><strong>Enminder</strong></div>
				<div class="content"></div>
			</div>
			<div id="altar" class="finalMachine box">
				<div class="header"><strong>Altar</strong></div>
				<div class="content"></div>
			</div>
			<div id="ensouler" class="finalMachine box">
				<div class="header"><strong>Ensouler</strong></div>
				<div class="content"></div>
			</div>
		</div>
		<div id="machines" class="main" style="display:none;">
			<div class="content">
			</div>
		</div>
	</div>
	<script type="text/javascript" src="data.js"></script>
	<script type="text/javascript" src="startup.js"></script>
	<script type="text/javascript" src="game.js"></script>
	<script type="text/javascript" src="settings.js"></script>
	<script type="text/javascript" src="tree.js"></script>
	<script type="text/javascript" src="info.js"></script>
	<script type="text/javascript" src="debug.js"></script>
	<script type="text/javascript" src="effects.js?v=7"></script>
	<script type="text/javascript" src="stickman.js"></script>
	<script type="text/javascript" src="stickmanDebug.js"></script>
</body>
</html>
